name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      # Lint retiré : `next lint` ouvre un prompt interactif de config ESLint
      # en CI (eslint non configuré). À réactiver après configuration ESLint.
      - name: Build (static export)
        run: npm run build
